<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scotland/Ireland Golf Prep</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0fdf4; /* Light green background */
            color: #0f172a;
        }
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Smooth transitions for tabs */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        golf: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            700: '#15803d',
                            900: '#14532d',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data Models
        const prepData = [
            {
                phase: "Phase 1: Mobility & Walking Base (Days 1–7)",
                objective: "Build walking stamina and loosen the posterior chain (calves, hamstrings, glutes).",
                days: [
                    { day: 1, text: "Perform 10 hip windshield wipers per side. Hold a 30-second forearm plank." },
                    { day: 2, text: "Complete 10 cat-cow stretches. Backyard: Take 15 slow, continuous wedge swings focusing on smooth weight transfer." },
                    { day: 3, text: "Take a 30-minute brisk walk in your golf shoes. Focus on keeping your shoulders back and posture tall." },
                    { day: 4, text: "Hold a 30-second glute bridge. Do 10 bird-dogs per side to stabilize the spine." },
                    { day: 5, text: "Backyard: Take 20 smooth swings with a 7-iron. Focus on maintaining a strong, steady posture." },
                    { day: 6, text: "Take a 40-minute fitness walk. Immediately follow with a 1-minute calf and hamstring stretch per leg." },
                    { day: 7, text: "Active recovery day. Spend 15 minutes stretching tight hips, glutes, and calves." }
                ]
            },
            {
                phase: "Phase 2: Push-Cart Stamina & Swing Activation (Days 8–14)",
                objective: "Increase walking distance while mimicking the forward-pushing motion of a cart.",
                days: [
                    { day: 8, text: "Do 10 hip windshield wipers. Backyard: Take 20 swings holding two clubs together for weight." },
                    { day: 9, text: "Take a 45-minute fitness walk. Find a few hills to simulate the leg drive needed to push a cart." },
                    { day: 10, text: "Range Day. Hit 30 balls at 50% power focusing strictly on center-face contact." },
                    { day: 11, text: "Do 10 bird-dogs per side. Backyard: Take 20 smooth driver swings focusing on tempo." },
                    { day: 12, text: "Take a 50-minute fitness walk. Focus on keeping your core slightly engaged to protect your spine." },
                    { day: 13, text: "Range Day. Hit 45 balls. Progress from wedges up to 7-iron at 75% power." },
                    { day: 14, text: "Rest day. Do 10 minutes of light full-body stretching. Hydrate with extra water." }
                ]
            },
            {
                phase: "Phase 3: Taper, Peak & Protect (Days 15–21)",
                objective: "Rest your legs so they are fresh, lock in swing rhythm, and maximize hydration.",
                days: [
                    { day: 15, text: "Do 10 glute bridges. Backyard: Take 15 swings focusing on holding a balanced finish for 3 seconds." },
                    { day: 16, text: "Range Day. Hit 50 balls simulating an actual course layout (e.g., driver, 7-iron, wedge)." },
                    { day: 17, text: "Take a light 15-minute walk. Do 10 cat-cow stretches and 10 hip windshield wipers." },
                    { day: 18, text: "Final Range Day. Hit 30 balls at 75% power. Focus heavily on short game and putting." },
                    { day: 19, text: "Backyard: Take 15 smooth, weighted club swings. Perform 5 thoracic rotations per side." },
                    { day: 20, text: "Pre-Load Day: Rest day. Pack your gear. Drink an extra 1 litre of water. Use your massage gun on your calves and glutes tonight." },
                    { day: 21, text: "Trip departure. Do your 5-minute pre-round warm-up routine before teeing off for your first 18-hole walk." }
                ]
            }
        ];

        const recoveryData = [
            {
                id: "hour1",
                time: "Hour 1: The Transition (At the Course)",
                icon: "timer",
                tasks: [
                    { id: "r1", label: "Decompress: Stand tall and do 5 gentle standing torso twists to release immediate swing tension." },
                    { id: "r2", label: "Rehydrate: Drink 500ml of water mixed with an electrolyte packet." },
                    { id: "r3", label: "Refuel: Eat a high-protein snack (e.g., beef jerky or a protein bar) to stop muscle breakdown." }
                ]
            },
            {
                id: "hour2",
                time: "Hour 2: The Reset (At the Hotel)",
                icon: "home",
                tasks: [
                    { id: "r4", label: "Massage Gun (6 Min): 2 mins each on calves, hamstrings, and glutes. Never on lower back bones/spine." },
                    { id: "r5", label: "Lacrosse Ball Glute Release (2 Min): Place ball under glute, roll to find knot, hold 30s. Switch sides." },
                    { id: "r6", label: "Legs Up the Wall Stretch (5 Min): Lie flat, scoot hips against wall, legs straight up in 'L' shape." }
                ]
            },
            {
                id: "bedtime",
                time: "Bedtime: Overnight Protection",
                icon: "moon",
                tasks: [
                    { id: "r7", label: "Topical Cream: Apply pain or anti-inflammatory cream across lower back, glutes, and calves." },
                    { id: "r8", label: "Pillow Placement: Pillow under knees (if on back) or between knees (if on side) to keep pelvis neutral." }
                ]
            }
        ];

        // SVGs as lightweight React components
        const Icons = {
            Calendar: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            Map: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>,
            Heart: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0l-.77.78-.77-.78a5.4 5.4 0 0 0-7.65 0C1.46 6.7 1.33 10.28 4 13l8 8 8-8c2.67-2.72 2.54-6.3.42-8.42z"></path></svg>,
            Apple: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06Z"></path><path d="M10 2c1 .5 2 2 2 5"></path></svg>,
            Briefcase: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"></rect><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path></svg>,
            CheckCircle: ({ checked }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill={checked ? "#22c55e" : "none"} stroke={checked ? "#22c55e" : "#94a3b8"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        };

        const packingData = [
            {
                category: "Golf Gear & Rain Protection",
                items: [
                    { id: "p1", label: "Golf Clubs & Travel Bag (Add AirTag)" },
                    { id: "p2", label: "Golf Shoes (Bring 2 pairs to rotate if wet)" },
                    { id: "p3", label: "Gore-Tex Rain Jacket & Rain Pants" },
                    { id: "p4", label: "Rain Gloves (2-3 pairs, they grip better when wet)" },
                    { id: "p5", label: "Windproof Umbrella" },
                    { id: "p6", label: "Plenty of Golf Balls (Expensive locally)" }
                ]
            },
            {
                category: "Clothing Layers (Link links)",
                items: [
                    { id: "p7", label: "Thermal Base Layers (Tops & Bottoms)" },
                    { id: "p8", label: "Mid-layers (Quarter-zips, light sweaters)" },
                    { id: "p9", label: "Merino Wool Golf Socks (4-5 pairs)" },
                    { id: "p10", label: "Warm Beanie / Winter Hat" },
                    { id: "p11", label: "Casual evening clothes & comfortable walking shoes" }
                ]
            },
            {
                category: "Recovery & Nutrition",
                items: [
                    { id: "p12", label: "Massage Gun + Charger" },
                    { id: "p13", label: "Lacrosse Ball (For glute release)" },
                    { id: "p14", label: "Topical Pain/Anti-inflammatory Cream" },
                    { id: "p15", label: "Electrolyte Packets (LMNT, Liquid I.V., etc.)" },
                    { id: "p16", label: "High-Protein Snacks / Beef Jerky" },
                    { id: "p17", label: "Blister Plasters / Athletic Tape" }
                ]
            },
            {
                category: "Travel Essentials",
                items: [
                    { id: "p18", label: "Passport (Check expiration date!)" },
                    { id: "p19", label: "UK / Ireland Power Adapters (Type G)" },
                    { id: "p20", label: "Portable Power Bank (For phone/GPS on course)" },
                    { id: "p21", label: "Flight Tickets & Course Confirmations" }
                ]
            }
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('prep');
            const [completedDays, setCompletedDays] = useState({});
            const [completedRecovery, setCompletedRecovery] = useState({});
            const [completedPacking, setCompletedPacking] = useState({});
            const [daysUntil, setDaysUntil] = useState(0);

            // Calculate days until June 5th
            useEffect(() => {
                const targetDate = new Date("2026-06-05T00:00:00").getTime();
                const now = new Date().getTime();
                const diff = targetDate - now;
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                setDaysUntil(days > 0 ? days : 0);

                // Load state from local storage
                try {
                    const savedDays = localStorage.getItem('golfPrepDays');
                    if (savedDays) setCompletedDays(JSON.parse(savedDays));
                    
                    const savedRecovery = localStorage.getItem('golfRecovery');
                    if (savedRecovery) setCompletedRecovery(JSON.parse(savedRecovery));

                    const savedPacking = localStorage.getItem('golfPacking');
                    if (savedPacking) setCompletedPacking(JSON.parse(savedPacking));
                } catch (e) {
                    console.log("Local storage not available", e);
                }
            }, []);

            const toggleDay = (dayNum) => {
                const newState = { ...completedDays, [dayNum]: !completedDays[dayNum] };
                setCompletedDays(newState);
                try { localStorage.setItem('golfPrepDays', JSON.stringify(newState)); } catch(e){}
            };

            const toggleRecovery = (taskId) => {
                const newState = { ...completedRecovery, [taskId]: !completedRecovery[taskId] };
                setCompletedRecovery(newState);
                try { localStorage.setItem('golfRecovery', JSON.stringify(newState)); } catch(e){}
            };

            const togglePacking = (itemId) => {
                const newState = { ...completedPacking, [itemId]: !completedPacking[itemId] };
                setCompletedPacking(newState);
                try { localStorage.setItem('golfPacking', JSON.stringify(newState)); } catch(e){}
            };

            const resetRecovery = () => {
                setCompletedRecovery({});
                try { localStorage.setItem('golfRecovery', JSON.stringify({})); } catch(e){}
            };

            const RenderPrepTab = () => (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h2 className="text-xl font-bold text-golf-900 mb-2">21-Day Preparation Calendar</h2>
                        <p className="text-sm text-gray-600 mb-4">Complete these daily tasks to build stamina and protect your swing.</p>
                        
                        <div className="w-full bg-gray-200 rounded-full h-2.5 mb-6">
                            <div className="bg-golf-500 h-2.5 rounded-full" style={{ width: `${(Object.values(completedDays).filter(Boolean).length / 21) * 100}%` }}></div>
                        </div>

                        {}
                        {prepData.map((phase, idx) => (
                            <div key={idx} className="mb-8">
                                <div className="bg-golf-50 border-l-4 border-golf-500 p-4 rounded-r-lg mb-4">
                                    <h3 className="font-bold text-golf-900">{phase.phase}</h3>
                                    <p className="text-sm text-golf-700 mt-1">{phase.objective}</p>
                                </div>
                                <div className="space-y-3">
                                    {phase.days.map((d) => (
                                        <label 
                                            key={d.day} 
                                            className={`flex items-start gap-4 p-4 rounded-lg cursor-pointer transition-all duration-200 border ${completedDays[d.day] ? 'bg-golf-50/50 border-golf-200' : 'bg-white border-gray-200 hover:border-golf-300 shadow-sm'}`}
                                        >
                                            <div className="mt-0.5 flex-shrink-0">
                                                <input 
                                                    type="checkbox" 
                                                    className="w-5 h-5 text-golf-600 bg-white border-gray-300 rounded focus:ring-golf-500 cursor-pointer"
                                                    checked={!!completedDays[d.day]}
                                                    onChange={() => toggleDay(d.day)}
                                                />
                                            </div>
                                            <div>
                                                <span className={`font-semibold text-sm mr-2 ${completedDays[d.day] ? 'text-gray-400 line-through' : 'text-gray-900'}`}>Day {d.day}:</span>
                                                <span className={`text-sm ${completedDays[d.day] ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{d.text}</span>
                                            </div>
                                        </label>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            const RenderCourseTab = () => (
                <div className="space-y-6 fade-in">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h2 className="text-xl font-bold text-golf-900 mb-4">On-Course Push Cart Strategies</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="bg-orange-50 border border-orange-200 p-5 rounded-xl">
                                <h3 className="font-bold text-orange-800 text-lg flex items-center gap-2 mb-2">
                                    <span className="bg-orange-200 text-orange-900 w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                                    Two-Handed Push
                                </h3>
                                <p className="text-orange-900/80 text-sm">
                                    <strong>Avoid pushing the cart with only one hand.</strong> This twists your spine repeatedly over 18 holes, causing massive uneven fatigue and potential injury. Always keep two hands on the handle.
                                </p>
                            </div>
                            <div className="bg-blue-50 border border-blue-200 p-5 rounded-xl">
                                <h3 className="font-bold text-blue-800 text-lg flex items-center gap-2 mb-2">
                                    <span className="bg-blue-200 text-blue-900 w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span>
                                    Stay Close
                                </h3>
                                <p className="text-blue-900/80 text-sm">
                                    <strong>Do not lean forward or reach out too far</strong> when pushing uphill. Keep the cart close to your body and use your legs—not your back—to power it forward. Stand tall.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const RenderRecoveryTab = () => (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <div className="flex justify-between items-start mb-6">
                            <div>
                                <h2 className="text-xl font-bold text-golf-900">3-Day Post-Round Recovery Routine</h2>
                                <p className="text-sm text-gray-600 mt-1">Execute this strict sequence within 1 hour of finishing each round.</p>
                            </div>
                            <button 
                                onClick={resetRecovery}
                                className="px-3 py-1.5 text-xs font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-md transition-colors"
                            >
                                Reset Daily
                            </button>
                        </div>

                        <div className="relative border-l-2 border-golf-200 ml-3 space-y-8 pl-6">
                            {recoveryData.map((stage) => (
                                <div key={stage.id} className="relative">
                                    <div className="absolute -left-[35px] bg-white border-2 border-golf-400 w-6 h-6 rounded-full"></div>
                                    <h3 className="font-bold text-lg text-golf-900 mb-3">{stage.time}</h3>
                                    <div className="space-y-3">
                                        {stage.tasks.map((task) => (
                                            <label 
                                                key={task.id} 
                                                className={`flex items-start gap-3 p-4 rounded-lg cursor-pointer border transition-colors ${completedRecovery[task.id] ? 'bg-golf-50 border-golf-200' : 'bg-gray-50 border-gray-200 hover:border-golf-300'}`}
                                            >
                                                <input 
                                                    type="checkbox" 
                                                    className="mt-1 w-4 h-4 text-golf-600 bg-white border-gray-300 rounded focus:ring-golf-500"
                                                    checked={!!completedRecovery[task.id]}
                                                    onChange={() => toggleRecovery(task.id)}
                                                />
                                                <span className={`text-sm ${completedRecovery[task.id] ? 'text-gray-500 line-through' : 'text-gray-800'}`}>
                                                    {task.label}
                                                </span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );

            const RenderNutritionTab = () => (
                <div className="space-y-6 fade-in pb-10">
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h2 className="text-xl font-bold text-golf-900 mb-4">Nutrition & Hydration Strategy</h2>
                        
                        <div className="space-y-6">
                            {/* Snack Preference Question */}
                            <div className="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                <h3 className="font-semibold text-gray-900 mb-2">Q: Do you prefer savoury or sweet snacks on the course?</h3>
                                <p className="text-sm text-gray-600 mb-4">
                                    Depending on your answer, here is your packing strategy:
                                </p>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="bg-white p-4 rounded border border-gray-200 shadow-sm">
                                        <h4 className="font-bold text-amber-700 flex items-center gap-2"><span className="text-lg">🥨</span> Savoury Preference</h4>
                                        <ul className="list-disc pl-5 mt-2 text-sm text-gray-700 space-y-1">
                                            <li>Beef or turkey jerky (high protein)</li>
                                            <li>Salted mixed nuts (cashews, almonds)</li>
                                            <li>Pretzel crisps (for quick carbs/salt)</li>
                                        </ul>
                                    </div>
                                    <div className="bg-white p-4 rounded border border-gray-200 shadow-sm">
                                        <h4 className="font-bold text-pink-700 flex items-center gap-2"><span className="text-lg">🍫</span> Sweet Preference</h4>
                                        <ul className="list-disc pl-5 mt-2 text-sm text-gray-700 space-y-1">
                                            <li>Protein bars (watch out for melting chocolate)</li>
                                            <li>Dried fruit (mango, raisins, dates)</li>
                                            <li>Gummy chews (energy blocks for back 9)</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            {/* Electrolyte Recommendation */}
                            <div className="bg-blue-50 p-5 rounded-lg border border-blue-200">
                                <h3 className="font-semibold text-blue-900 mb-2">Q: Recommended high-quality electrolyte brands?</h3>
                                <p className="text-sm text-blue-800 mb-3">
                                    Walking 12 days in Scotland/Ireland winds means you will dehydrate without realizing it. Do not rely on plain water. Look for these high-quality brands (low sugar, high sodium/magnesium):
                                </p>
                                <ul className="space-y-2">
                                    <li className="flex gap-2 text-sm text-blue-900 bg-white p-2 rounded shadow-sm border border-blue-100">
                                        <span className="font-bold text-blue-600">LMNT:</span> Very high sodium (1000mg), zero sugar. Perfect for heavy sweaters.
                                    </li>
                                    <li className="flex gap-2 text-sm text-blue-900 bg-white p-2 rounded shadow-sm border border-blue-100">
                                        <span className="font-bold text-blue-600">Liquid I.V.:</span> Contains some sugar to speed hydration absorption. Great taste.
                                    </li>
                                    <li className="flex gap-2 text-sm text-blue-900 bg-white p-2 rounded shadow-sm border border-blue-100">
                                        <span className="font-bold text-blue-600">Nuun Sport:</span> Effervescent tablets, easy to pack, light flavor, low sugar.
                                    </li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const RenderPackingTab = () => {
                const totalItems = packingData.reduce((acc, cat) => acc + cat.items.length, 0);
                const packedItems = Object.values(completedPacking).filter(Boolean).length;
                const progressPercentage = totalItems === 0 ? 0 : (packedItems / totalItems) * 100;

                return (
                    <div className="space-y-6 fade-in pb-10">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <h2 className="text-xl font-bold text-golf-900 mb-2">Trip Packing List</h2>
                            <p className="text-sm text-gray-600 mb-4">Scotland and Ireland require specific gear. Check items off as they go into your bag.</p>
                            
                            <div className="mb-6">
                                <div className="flex justify-between text-xs font-semibold text-gray-500 mb-1">
                                    <span>Packing Progress</span>
                                    <span>{packedItems} / {totalItems} items</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2.5">
                                    <div className="bg-blue-500 h-2.5 rounded-full transition-all duration-500" style={{ width: `${progressPercentage}%` }}></div>
                                </div>
                            </div>

                            <div className="space-y-6">
                                {packingData.map((category, idx) => (
                                    <div key={idx} className="bg-gray-50 rounded-lg p-4 border border-gray-200">
                                        <h3 className="font-bold text-gray-800 mb-3 text-sm uppercase tracking-wider">{category.category}</h3>
                                        <div className="space-y-2">
                                            {category.items.map((item) => (
                                                <label 
                                                    key={item.id} 
                                                    className={`flex items-start gap-3 p-3 rounded-md cursor-pointer transition-colors ${completedPacking[item.id] ? 'bg-blue-50 border border-blue-100' : 'bg-white border border-gray-200 hover:border-blue-300'}`}
                                                >
                                                    <input 
                                                        type="checkbox" 
                                                        className="mt-0.5 w-5 h-5 text-blue-600 bg-white border-gray-300 rounded focus:ring-blue-500"
                                                        checked={!!completedPacking[item.id]}
                                                        onChange={() => togglePacking(item.id)}
                                                    />
                                                    <span className={`text-sm ${completedPacking[item.id] ? 'text-gray-400 line-through' : 'text-gray-700 font-medium'}`}>
                                                        {item.label}
                                                    </span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen max-w-2xl mx-auto flex flex-col font-sans">
                    {/* Header */}
                    <header className="bg-golf-900 text-white p-6 rounded-b-3xl shadow-md">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <h1 className="text-2xl font-bold tracking-tight">Scotland & Ireland</h1>
                                <p className="text-golf-100 text-sm mt-1">Golf Trip Preparation Protocol</p>
                            </div>
                            <div className="bg-white/20 p-3 rounded-xl backdrop-blur-sm text-center min-w-[80px]">
                                <div className="text-2xl font-bold">{daysUntil}</div>
                                <div className="text-[10px] uppercase tracking-wider font-semibold opacity-80">Days Left</div>
                            </div>
                        </div>
                        
                        {}
                        <div className="flex space-x-1 bg-white/10 p-1 rounded-lg mt-6 overflow-x-auto">
                            <button 
                                onClick={() => setActiveTab('prep')}
                                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'prep' ? 'bg-white text-golf-900 shadow' : 'text-white hover:bg-white/10'}`}
                            >
                                <Icons.Calendar /> Prep 
                            </button>
                            <button 
                                onClick={() => setActiveTab('packing')}
                                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'packing' ? 'bg-white text-blue-600 shadow' : 'text-white hover:bg-white/10'}`}
                            >
                                <Icons.Briefcase /> Pack
                            </button>
                            <button 
                                onClick={() => setActiveTab('course')}
                                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'course' ? 'bg-white text-golf-900 shadow' : 'text-white hover:bg-white/10'}`}
                            >
                                <Icons.Map /> Course
                            </button>
                            <button 
                                onClick={() => setActiveTab('recovery')}
                                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'recovery' ? 'bg-white text-golf-900 shadow' : 'text-white hover:bg-white/10'}`}
                            >
                                <Icons.Heart /> Recover
                            </button>
                            <button 
                                onClick={() => setActiveTab('nutrition')}
                                className={`flex-1 flex items-center justify-center gap-2 py-2 px-3 rounded-md text-sm font-medium transition-colors whitespace-nowrap ${activeTab === 'nutrition' ? 'bg-white text-golf-900 shadow' : 'text-white hover:bg-white/10'}`}
                            >
                                <Icons.Apple /> Fuel
                            </button>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 p-4 md:p-6 mt-2">
                        {activeTab === 'prep' && <RenderPrepTab />}
                        {activeTab === 'packing' && <RenderPackingTab />}
                        {activeTab === 'course' && <RenderCourseTab />}
                        {activeTab === 'recovery' && <RenderRecoveryTab />}
                        {activeTab === 'nutrition' && <RenderNutritionTab />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
